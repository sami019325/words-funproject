<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Upload | Words & Wisdom</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@400;500;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        h1,
        h2 {
            font-family: 'Outfit', sans-serif;
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">

    <div class="bg-white w-full max-w-2xl rounded-3xl shadow-2xl overflow-hidden p-8">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-slate-900">Upload New Word</h1>
            <a href="index.html"
                class="text-sm font-semibold text-indigo-600 hover:text-indigo-800 transition-colors">Back to Search</a>
        </div>

        <form id="uploadForm" class="space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-bold text-slate-500 mb-2 uppercase tracking-wide">The Word</label>
                    <input type="text" id="postWord" required
                        class="w-full px-6 py-4 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-500 mb-2 uppercase tracking-wide">Author
                        Name</label>
                    <input type="text" id="postAuthor" required
                        class="w-full px-6 py-4 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-500 mb-2 uppercase tracking-wide">The Meaning</label>
                <input type="text" id="postMeaning" required
                    class="w-full px-6 py-4 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500"
                    placeholder="Briefly define the word...">
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-500 mb-2 uppercase tracking-wide">The Content</label>
                <textarea id="postContent" required rows="8"
                    class="w-full px-6 py-4 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500"
                    placeholder="Write the details here..."></textarea>
            </div>
            <div class="flex justify-end">
                <button type="submit"
                    class="bg-indigo-600 text-white px-10 py-4 rounded-xl font-bold hover:bg-slate-900 transition-all shadow-xl shadow-indigo-100">Publish
                    Word</button>
            </div>
        </form>

        <div id="statusMessage" class="mt-6 p-4 rounded-xl hidden"></div>
    </div>

    <script>
        const form = document.getElementById('uploadForm');
        const status = document.getElementById('statusMessage');

        form.onsubmit = async (e) => {
            e.preventDefault();

            const data = {
                word: document.getElementById('postWord').value,
                author: document.getElementById('postAuthor').value,
                meaning: document.getElementById('postMeaning').value,
                content: document.getElementById('postContent').value
            };

            try {
                const res = await fetch('/api/words', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    status.innerText = "Word published successfully!";
                    status.className = "mt-6 p-4 rounded-xl bg-green-100 text-green-700 font-bold text-center block";
                    form.reset();
                } else {
                    const err = await res.json();
                    status.innerText = err.error || "Failed to publish word.";
                    status.className = "mt-6 p-4 rounded-xl bg-red-100 text-red-700 font-bold text-center block";
                }
            } catch (err) {
                console.error(err);
                status.innerText = "Connection error.";
                status.className = "mt-6 p-4 rounded-xl bg-red-100 text-red-700 font-bold text-center block";
            }
        };
    </script>
</body>

</html>
